<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="col" style="gap:10px">
  <span class="label">radii · crisp · no 24/32 cards</span>
  <div class="row" style="gap:14px;align-items:flex-end">
    
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:56px;height:56px;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:4px"></div>
      <span class="name" style="font-size:11px">xs</span>
      <span class="hex" style="font-size:9.5px">4px</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:56px;height:56px;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:6px"></div>
      <span class="name" style="font-size:11px">sm</span>
      <span class="hex" style="font-size:9.5px">6px</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:56px;height:56px;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:8px"></div>
      <span class="name" style="font-size:11px">md</span>
      <span class="hex" style="font-size:9.5px">8px</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:56px;height:56px;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:10px"></div>
      <span class="name" style="font-size:11px">lg</span>
      <span class="hex" style="font-size:9.5px">10px</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:56px;height:56px;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:12px"></div>
      <span class="name" style="font-size:11px">xl</span>
      <span class="hex" style="font-size:9.5px">12px</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:56px;height:56px;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:16px"></div>
      <span class="name" style="font-size:11px">2xl</span>
      <span class="hex" style="font-size:9.5px">16px</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:56px;height:56px;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:9999px"></div>
      <span class="name" style="font-size:11px">pill</span>
      <span class="hex" style="font-size:9.5px">pill</span>
    </div>
  </div>
</div>
</body></html>
