<!doctype html>
<!-- @dsCard group="Brand" name="Foreground tokens" subtitle="fg-1…fg-5 on ink" viewport="700x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="col" style="gap:10px">
  <span class="label">semantic · foreground & state on ink</span>
  <div class="grid" style="grid-template-columns:repeat(5,1fr);gap:10px">
    
    <div class="col" style="gap:4px">
      <div style="height:36px;background:#e7ecf2;border-radius:6px;border:1px solid var(--tk-ink-2)"></div>
      <span class="name" style="font-size:11px">primary</span>
      <span class="hex" style="font-size:9.5px">#E7ECF2</span>
      <span class="token" style="font-size:9px">--tk-fg-1</span>
    </div>
    <div class="col" style="gap:4px">
      <div style="height:36px;background:#cbd5e1;border-radius:6px;border:1px solid var(--tk-ink-2)"></div>
      <span class="name" style="font-size:11px">secondary</span>
      <span class="hex" style="font-size:9.5px">#CBD5E1</span>
      <span class="token" style="font-size:9px">--tk-fg-2</span>
    </div>
    <div class="col" style="gap:4px">
      <div style="height:36px;background:#8a98a8;border-radius:6px;border:1px solid var(--tk-ink-2)"></div>
      <span class="name" style="font-size:11px">muted</span>
      <span class="hex" style="font-size:9.5px">#8A98A8</span>
      <span class="token" style="font-size:9px">--tk-fg-3</span>
    </div>
    <div class="col" style="gap:4px">
      <div style="height:36px;background:#6b7785;border-radius:6px;border:1px solid var(--tk-ink-2)"></div>
      <span class="name" style="font-size:11px">dim</span>
      <span class="hex" style="font-size:9.5px">#6B7785</span>
      <span class="token" style="font-size:9px">--tk-fg-4</span>
    </div>
    <div class="col" style="gap:4px">
      <div style="height:36px;background:#5d6975;border-radius:6px;border:1px solid var(--tk-ink-2)"></div>
      <span class="name" style="font-size:11px">faint</span>
      <span class="hex" style="font-size:9.5px">#5D6975</span>
      <span class="token" style="font-size:9px">--tk-fg-5</span>
    </div>
  </div>
</div>
</body></html>
