<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="col" style="gap:8px">
  <span class="label">glyphs · unicode in mono · no icon font</span>
  <div class="grid" style="grid-template-columns:repeat(8,1fr);gap:10px">
    
    <div class="col" style="gap:4px;align-items:center;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:8px;padding:10px 6px">
      <div style="font-family:var(--tk-font-mono);font-size:22px;color:var(--tk-fg-1);line-height:1">↓</div>
      <span class="hex" style="font-size:9px">download</span>
    </div>
    <div class="col" style="gap:4px;align-items:center;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:8px;padding:10px 6px">
      <div style="font-family:var(--tk-font-mono);font-size:22px;color:var(--tk-fg-1);line-height:1">↗</div>
      <span class="hex" style="font-size:9px">external</span>
    </div>
    <div class="col" style="gap:4px;align-items:center;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:8px;padding:10px 6px">
      <div style="font-family:var(--tk-font-mono);font-size:22px;color:var(--tk-fg-1);line-height:1">✓</div>
      <span class="hex" style="font-size:9px">copied</span>
    </div>
    <div class="col" style="gap:4px;align-items:center;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:8px;padding:10px 6px">
      <div style="font-family:var(--tk-font-mono);font-size:22px;color:var(--tk-fg-1);line-height:1">✗</div>
      <span class="hex" style="font-size:9px">error</span>
    </div>
    <div class="col" style="gap:4px;align-items:center;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:8px;padding:10px 6px">
      <div style="font-family:var(--tk-font-mono);font-size:22px;color:var(--tk-fg-1);line-height:1">⧉</div>
      <span class="hex" style="font-size:9px">copy</span>
    </div>
    <div class="col" style="gap:4px;align-items:center;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:8px;padding:10px 6px">
      <div style="font-family:var(--tk-font-mono);font-size:22px;color:var(--tk-fg-1);line-height:1">×</div>
      <span class="hex" style="font-size:9px">close</span>
    </div>
    <div class="col" style="gap:4px;align-items:center;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:8px;padding:10px 6px">
      <div style="font-family:var(--tk-font-mono);font-size:22px;color:var(--tk-fg-1);line-height:1">·</div>
      <span class="hex" style="font-size:9px">separator</span>
    </div>
    <div class="col" style="gap:4px;align-items:center;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:8px;padding:10px 6px">
      <div style="font-family:var(--tk-font-mono);font-size:22px;color:var(--tk-fg-1);line-height:1">…</div>
      <span class="hex" style="font-size:9px">loading</span>
    </div>
  </div>
</div>
</body></html>
