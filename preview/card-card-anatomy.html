<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="col" style="gap:10px">
  <span class="label">card · head + body + foot · 12px radius</span>
  <div class="row" style="gap:14px;align-items:stretch">
    <div style="flex:1;background:var(--tk-ink-soft);border:1px solid var(--tk-ink-2);border-radius:12px;overflow:hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--tk-ink-2)">
        <span style="font-family:var(--tk-font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--tk-fg-3)">Publication logo</span>
        <span style="font-family:var(--tk-font-mono);font-size:10px;color:var(--tk-fg-3)">600×160</span>
      </div>
      <div style="padding:24px 14px;display:flex;align-items:center;justify-content:center;color:var(--tk-fg-2);font-size:12px;font-family:var(--tk-font-mono)">card-body</div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-top:1px solid var(--tk-ink-2)">
        <span style="font-family:var(--tk-font-mono);font-size:10px;color:var(--tk-fg-3)">tekrogen-logo-dark.png</span>
        <button style="font-family:var(--tk-font-mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;padding:5px 10px;border-radius:6px;border:1px solid var(--tk-ink-2);background:transparent;color:#cbd5e1;cursor:pointer">↓ png</button>
      </div>
    </div>
  </div>
</div>
</body></html>
