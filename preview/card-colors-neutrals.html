<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="col" style="gap:8px">
  <span class="label">neutrals · ink + paper</span>
  <div class="grid" style="grid-template-columns:repeat(5,1fr);gap:10px">
    
    <div class="col" style="gap:6px">
      <div class="swatch" style="background:#0e1116;border:1px solid var(--tk-ink-2);color:#cbd5e1"></div>
      <div class="col" style="gap:0"><span class="name">ink</span><span class="hex">#0E1116</span></div>
    </div>
    <div class="col" style="gap:6px">
      <div class="swatch" style="background:#171c24;border:1px solid var(--tk-ink-2);color:#cbd5e1"></div>
      <div class="col" style="gap:0"><span class="name">ink-soft</span><span class="hex">#171C24</span></div>
    </div>
    <div class="col" style="gap:6px">
      <div class="swatch" style="background:#fbfcfd;border:1px solid var(--tk-ink-2);color:#1f2731"></div>
      <div class="col" style="gap:0"><span class="name">paper</span><span class="hex">#FBFCFD</span></div>
    </div>
    <div class="col" style="gap:6px">
      <div class="swatch" style="background:#f4ede2;border:1px solid var(--tk-ink-2);color:#1f2731"></div>
      <div class="col" style="gap:0"><span class="name">paper-warm</span><span class="hex">#F4EDE2</span></div>
    </div>
    <div class="col" style="gap:6px">
      <div class="swatch" style="background:#385166;border:1px solid var(--tk-ink-2);color:#cbd5e1"></div>
      <div class="col" style="gap:0"><span class="name">body</span><span class="hex">#385166</span></div>
    </div>
  </div>
</div>
</body></html>
