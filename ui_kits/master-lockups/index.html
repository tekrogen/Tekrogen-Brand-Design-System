<!doctype html>
<!-- @dsCard group="UI Kit — Master Lockups" name="UI Kit · Master lockup sheet" subtitle="Brand foundations · A/C + theme toggle" viewport="1380x980" -->
<html lang="en" data-tk-theme="ink">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tekrogen · Master Lockup Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="stylesheet" href="../_shared/tk-theme.css"/>
<style>
  /* Self-hosted Regular weights (from /fonts/). Heavier weights come from Google above. */
  @font-face { font-family: 'Poppins';       font-style: normal; font-weight: 400; font-display: swap; src: url('../../fonts/poppins-v24-latin-regular.woff2') format('woff2'); }
  @font-face { font-family: 'Manrope';       font-style: normal; font-weight: 400; font-display: swap; src: url('../../fonts/manrope-v20-latin-regular.woff2') format('woff2'); }
  @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400; font-display: swap; src: url('../../fonts/JetBrainsMono-Regular.woff2') format('woff2'); }
  :root {
    /* Local aliases for legacy selectors in this file.
     * Palette source is colors_and_type.css → tokens/palette.js.
     * Do not change hexes here — they reference --tk-* tokens. */
    --ink:    var(--tk-ink);
    --ink-2:  var(--tk-ink-soft);
    --line:   var(--tk-ink-2);
    --paper:  var(--tk-paper);
    --paper-2:#f2f4f7;
    --paper-line:#e6ebef;
    --muted:  #6b7785;
    --muted-d:#8a98a8;
    --cyan:   var(--tk-cyan);

    --org:    var(--tk-org);
    --studio: var(--tk-studio);
    --com:    var(--tk-com);
    --net:    var(--tk-net);
    --body:   var(--tk-body);

    --org-print:    var(--tk-org-print);
    --studio-print: var(--tk-studio-print);
    --com-print:    var(--tk-com-print);
    --net-print:    var(--tk-net-print);
    --body-print:   var(--tk-body-print);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--tk-bg-1); color: var(--tk-fg-1); font-family: 'Poppins', 'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif; }
  body { font-feature-settings: 'ss01','cv11'; }
  a { color: var(--tk-link); text-decoration: none; }

  /* layout */
  .page { max-width: 1480px; margin: 0 auto; padding: 80px 56px 160px; }
  .hgroup { display: flex; align-items: baseline; gap: 24px; margin-bottom: 12px; }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: var(--tk-fs-eyebrow); letter-spacing: 0.18em; text-transform: uppercase; color: var(--tk-accent); }
  h1 { font-weight: 700; font-size: var(--tk-fs-h1); letter-spacing: -0.02em; margin: 8px 0 18px; line-height: 1.05; }
  h2 { font-weight: 700; font-size: var(--tk-fs-h2); letter-spacing: -0.015em; margin: 0; line-height: 1.1; }
  h3 { font-weight: 600; font-size: var(--tk-fs-h4); letter-spacing: 0; margin: 0; }
  p.lead { color: var(--tk-fg-3); max-width: 720px; line-height: 1.55; font-size: var(--tk-fs-body); }

  /* sections */
  section { margin-top: 96px; }
  .section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; padding-bottom: 20px; margin-bottom: 28px; border-bottom: 1px solid var(--tk-border); }
  .section-head .right { color: var(--tk-fg-3); font-family: 'JetBrains Mono', monospace; font-size: var(--tk-fs-meta); letter-spacing: 0.12em; text-transform: uppercase; }
  .section-lead { color: var(--tk-fg-3); max-width: 760px; line-height: 1.55; margin: 0 0 28px; font-size: var(--tk-fs-body); }

  /* boards (artboard tiles) */
  .grid { display: grid; gap: 20px; }
  .board { background: var(--ink-2); border: 1px solid var(--line); border-radius: 14px; padding: 0; overflow: hidden; display: flex; flex-direction: column; }
  .board.paper { background: var(--paper); border-color: var(--paper-line); color: #1f2731; }
  .board.deep  { background: #0a0d12; }
  .board-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--line); }
  .board.paper .board-head { border-bottom-color: var(--paper-line); }
  .board-tag { font-family: 'JetBrains Mono', monospace; font-size: var(--tk-fs-meta); letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
  .board.paper .board-tag { color: #8a98a8; }
  .board-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 36px 20px; }

  /* lockup */
  .lockup { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .lockup .wm { font-family: 'Poppins', 'Manrope', system-ui, sans-serif; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
  .lockup.light .wm { color: #fbfcfd; }
  .lockup.dark .wm { color: #1f2731; }
  .lockup.mono .wm { font-family: 'JetBrains Mono', monospace; font-weight: 500; letter-spacing: 0.12em; text-transform: lowercase; }
  .lockup.mono .wm::before { content: '~/'; opacity: 0.45; margin-right: 2px; }
  .tagline { font-family: 'JetBrains Mono', monospace; font-size: var(--tk-fs-meta); letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
  .lockup.dark .tagline { color: #6b7785; }

  /* size labels */
  .size-row { display: flex; align-items: flex-end; gap: 36px; flex-wrap: wrap; }
  .size-cell { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .size-cell .label { font-family: 'JetBrains Mono', monospace; font-size: var(--tk-fs-meta); letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; }

  /* clear-space schematic */
  .clearspace { position: relative; padding: 56px; background: var(--ink-2); border-radius: 12px; }
  .cs-grid { position: absolute; inset: 0; background-image:
    linear-gradient(to right, rgba(31,213,218,0.10) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(31,213,218,0.10) 1px, transparent 1px);
    background-size: 16px 16px; pointer-events: none; }
  .cs-bbox { position: relative; border: 1px dashed rgba(31,213,218,0.4); padding: 28px 40px; display: inline-flex; }
  .cs-callouts { position: absolute; inset: 0; pointer-events: none; }
  .cs-callout { position: absolute; font-family: 'JetBrains Mono', monospace; font-size: var(--tk-fs-meta); letter-spacing: 0.14em; color: var(--cyan); text-transform: uppercase; }

  /* tables */
  table.tokens { width: 100%; border-collapse: collapse; font-size: var(--tk-fs-body-sm); }
  table.tokens th, table.tokens td { text-align: left; padding: 14px 16px; border-bottom: 1px solid var(--tk-border); }
  table.tokens th { font-family: 'JetBrains Mono', monospace; font-size: var(--tk-fs-meta); letter-spacing: 0.14em; text-transform: uppercase; color: var(--tk-fg-3); font-weight: 500; }
  table.tokens .sw { display: inline-block; width: 22px; height: 22px; border-radius: 5px; vertical-align: middle; margin-right: 12px; border: 1px solid rgba(255,255,255,0.08); }
  table.tokens code { font-family: 'JetBrains Mono', monospace; font-size: var(--tk-fs-code); color: var(--tk-fg-2); }
  table.tokens .role { color: var(--tk-fg-1); font-weight: 500; }
  table.tokens .meaning { color: var(--tk-fg-3); }

  /* domain split cards */
  .domain-grid { display: grid; grid-template-columns: 120px repeat(3, 1fr); gap: 0; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: var(--ink-2); }
  .domain-grid .hdr { padding: 16px 18px; border-bottom: 1px solid var(--line); font-family: 'JetBrains Mono', monospace; font-size: var(--tk-fs-meta); letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
  .domain-grid .row-label { padding: 28px 18px; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); display: flex; flex-direction: column; justify-content: center; gap: 6px; }
  .domain-grid .row-label .dot { width: 12px; height: 12px; border-radius: 50%; }
  .domain-grid .row-label .name { font-weight: 600; font-size: var(--tk-fs-body); }
  .domain-grid .row-label .meaning { font-size: var(--tk-fs-body-sm); color: var(--muted-d); line-height: 1.4; }
  .domain-grid .cell { padding: 28px 16px; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); display: flex; align-items: center; justify-content: center; min-height: 140px; }
  .domain-grid .cell:last-child { border-right: none; }
  .domain-grid .hdr:last-child { border-right: none; }
  .domain-grid > div:nth-last-child(-n+4) { border-bottom: none; }

  /* Ghost mocks */
  .ghost-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
  .browser { background: var(--paper); color: #1f2731; border-radius: 10px; overflow: hidden; border: 1px solid var(--paper-line); }
  .browser .chrome { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--paper-2); border-bottom: 1px solid var(--paper-line); }
  .browser .dots { display: flex; gap: 6px; }
  .browser .dot { width: 10px; height: 10px; border-radius: 50%; background: #d2d6db; }
  .browser .tab { display: flex; align-items: center; gap: 8px; padding: 4px 12px 4px 8px; background: var(--paper); border-radius: 8px; border: 1px solid var(--paper-line); font-size: var(--tk-fs-meta); color: #4b5563; max-width: 220px; }
  .browser .urlbar { flex: 1; background: var(--paper); border: 1px solid var(--paper-line); border-radius: 8px; padding: 4px 10px; font-family: 'JetBrains Mono', monospace; font-size: var(--tk-fs-meta); color: #6b7280; }
  .browser .body-row { padding: 28px 32px; min-height: 180px; }

  .ghost-publication { background: #0e1116; color: #e7ecf2; padding: 56px 48px; border-radius: 12px; border: 1px solid var(--line); }
  .ghost-publication .siteheader { display: flex; align-items: center; justify-content: space-between; padding-bottom: 28px; border-bottom: 1px solid #1f2731; }
  .ghost-publication nav { display: flex; gap: 22px; font-size: var(--tk-fs-body-sm); color: var(--muted-d); }
  .ghost-publication .hero-title { font-size: var(--tk-fs-h1); line-height: 1.08; letter-spacing: -0.02em; margin: 40px 0 14px; font-weight: 700; max-width: 720px; }
  .ghost-publication .hero-dek { color: var(--muted-d); font-size: var(--tk-fs-body); line-height: 1.55; max-width: 640px; font-family: 'Poppins', 'Manrope', system-ui, sans-serif; font-style: italic; font-weight: 400; }
  .ghost-publication .hero-meta { margin-top: 28px; display: flex; gap: 16px; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: var(--tk-fs-meta); letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
  .ghost-publication .pill { padding: 3px 10px; border: 1px solid #1f2731; border-radius: 20px; color: var(--cyan); }

  .social-card { aspect-ratio: 1.91 / 1; background: #0e1116; border-radius: 12px; border: 1px solid var(--line); padding: 36px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
  .social-card::after { content: ''; position: absolute; top:-40px; right:-60px; width: 320px; height: 320px; background: radial-gradient(circle at center, rgba(13,180,185,0.18), transparent 60%); }
  .social-card .top { display: flex; align-items: center; gap: 14px; position: relative; z-index: 2; }
  .social-card .bot { display: flex; justify-content: space-between; align-items: flex-end; position: relative; z-index: 2; }
  .social-card .title { font-size: var(--tk-fs-h2); font-weight: 700; line-height: 1.15; max-width: 80%; }
  .social-card .url { font-family: 'JetBrains Mono', monospace; font-size: var(--tk-fs-meta); color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }

  /* spec list */
  .spec { display: grid; grid-template-columns: 180px 1fr; gap: 14px 32px; font-size: var(--tk-fs-body-sm); padding-top: 6px; }
  .spec dt { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: var(--tk-fs-meta); letter-spacing: 0.14em; text-transform: uppercase; }
  .spec dd { margin: 0; color: #d6dde6; line-height: 1.5; }

  /* footer note */
  .note { font-family: 'JetBrains Mono', monospace; font-size: var(--tk-fs-meta); letter-spacing: 0.12em; text-transform: uppercase; color: var(--tk-fg-3); margin-top: 24px; }

  /* utility */
  .row-2 { grid-template-columns: 1fr 1fr; }
  .row-3 { grid-template-columns: repeat(3, 1fr); }
  @media (max-width: 1080px) {
    .row-2, .row-3, .ghost-grid { grid-template-columns: 1fr; }
    .page { padding: 56px 24px 120px; }
    h1 { font-size: var(--tk-fs-h1); }
    .domain-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="page" id="root"></div>

<script src="../_shared/tk-theme.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../_shared/lockups-app.jsx"></script>
</body>
</html>
