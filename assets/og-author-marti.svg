<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" aria-label="M. Dolce — Founder · Builder · Writer at Tekrogen">
  <title>M. Dolce — Tekrogen author card</title>
  <desc>Author profile card. Tekrogen logo top-left, gradient avatar with initials MD bottom-left, name M. Dolce with tagline FOUNDER · BUILDER · WRITER and a two-line summary.</desc>

  <defs>
    
    
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6491ac"></stop>
      <stop offset="100%" stop-color="#0db4b9"></stop>
    </linearGradient>

    
    <radialGradient id="cornerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0db4b9" stop-opacity="0.20"></stop>
      <stop offset="60%" stop-color="#0db4b9" stop-opacity="0"></stop>
    </radialGradient>

    
  </defs>

  
  <rect width="1200" height="630" fill="#0e1116"></rect>

  
  <circle cx="1080" cy="180" r="280" fill="url(#cornerGlow)"></circle>

  
  <g transform="translate(60, 50) scale(0.22)">
    <g transform="rotate(18 100 110)">
      <polygon points="100,4 108,9 108,19 100,24 92,19 92,9" fill="#3f617b"></polygon>
      <polygon points="95,22 105,22 108,34 92,34" fill="#385166"></polygon>
      <polygon points="94,32 18,6 22,68 52,72 94,68" fill="#446e88"></polygon>
      <polygon points="94,32 18,6 40,14 82,42 94,42" fill="#385166" opacity="0.45"></polygon>
      <polygon points="106,32 182,6 178,68 148,72 106,68" fill="#6491ac"></polygon>
      <polygon points="106,32 182,6 160,14 118,42 106,42" fill="#446e88" opacity="0.45"></polygon>
      <polygon points="94,68 32,84 38,126 94,110" fill="#0db4b9"></polygon>
      <polygon points="94,68 32,84 52,96 94,84" fill="#0893a4" opacity="0.55"></polygon>
      <polygon points="106,68 168,84 162,126 106,110" fill="#7edba5"></polygon>
      <polygon points="106,68 168,84 148,96 106,84" fill="#3dcfa3" opacity="0.55"></polygon>
      <polygon points="94,32 106,32 110,70 108,130 103,216 100,220 97,216 92,130 90,70" fill="#385166"></polygon>
      <polygon points="98,34 102,34 104,80 101,210 100,220 99,210 96,80" fill="#3f617b" opacity="0.4"></polygon>
    </g>
