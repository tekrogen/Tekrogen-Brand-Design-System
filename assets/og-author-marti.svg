  <text x="130" y="92" font-family="Poppins, sans-serif" font-weight="700" font-size="28" letter-spacing="5" fill="#fbfcfd">TEKROGEN</text>

  
  <circle cx="160" cy="450" r="90" fill="url(#avatarGrad)"></circle>
  <text x="160" y="468" font-family="Poppins, sans-serif" font-weight="700" font-size="48" text-anchor="middle" fill="#fbfcfd">MD</text>

  
  <text x="290" y="423" font-family="Poppins, sans-serif" font-weight="700" font-size="52" letter-spacing="-0.5" fill="#fbfcfd">M. Dolce</text>

  
  <text x="290" y="460" font-family="Poppins, sans-serif" font-weight="600" font-size="15" letter-spacing="3" fill="#1fd5da">FOUNDER · BUILDER · WRITER</text>

  
  <text x="290" y="505" font-family="Poppins, sans-serif" font-weight="400" font-size="20" fill="#8a98a8">
    <tspan x="290" dy="0">Founder of Tekrogen. Documenting the build — research,</tspan>
    <tspan x="290" dy="28">decisions, and the templates that come out the other side.</tspan>
  </text>
